"$schema" = 'https://starship.rs/config-schema.json'

command_timeout = 2000

format = """
[¯éÂ](#9A348E)\
$os\
$username\
[¯é░](bg:#DA627D fg:#9A348E)\
$directory\
[¯é░](fg:#DA627D bg:#FCA17D)\
$git_branch\
$git_status\
[¯é░](fg:#FCA17D bg:#86BBD8)\
